<!DOCTYPE html>
<html lang="sq">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vale Beach Bar | Service</title>
    <link rel="stylesheet" href="service.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Space+Grotesk:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="service-app">
      <header>
        <p class="eyebrow">Vale Beach Bar</p>
        <h1>Waiter Calls & Orders</h1>
        <p class="subtext">Monitor and process QR requests from the beach.</p>
      </header>

      <section class="panel" aria-label="Waiter calls">
        <div class="panel-heading">
          <h2>Waiter Calls</h2>
          <p>Pending and seen waiter requests.</p>
        </div>
        <div class="calls" id="callsList">
          <p class="placeholder">Loading active calls…</p>
        </div>
      </section>

      <section class="panel" aria-label="Incoming orders">
        <div class="panel-heading">
          <h2>Incoming Orders</h2>
          <p>Newest active orders first.</p>
        </div>
        <div class="calls" id="ordersList">
          <p class="placeholder">Loading orders…</p>
        </div>
      </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="service.js"></script>
  </body>
</html>
