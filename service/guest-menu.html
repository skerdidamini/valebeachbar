<!DOCTYPE html>
<html lang="sq">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vale Beach Bar | Call Waiter & Order</title>
    <link rel="stylesheet" href="guest-menu.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Space+Grotesk:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="guest-panel">
      <section class="guest-header">
        <p class="eyebrow">Vale Beach Bar</p>
        <div class="language-switcher" aria-label="Language switcher">
          <button class="lang-btn" data-lang="sq">SQ</button>
          <button class="lang-btn" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="it">IT</button>
        </div>
        <div class="umbrella-row">
          <h1>
            <span id="umbrellaLabelText">Umbrella</span>
            <span id="umbrellaNumber">—</span>
          </h1>
        </div>
        <div class="action-row">
  <button class="ghost-btn" id="callWaiterBtn" disabled>Call Waiter</button>
</div>

<section class="category-shortcuts" id="categoryShortcuts"></section>

<div class="messages" id="messageArea"></div>
      </section>

      <section class="menu-section">
        <h2 id="quickMenuTitle">Quick Menu</h2>
        <div class="menu-grid" id="menuGrid"></div>
      </section>

      <section class="cart-panel">
  <div class="cart-summary">
    <h3 class="cart-title" id="cartTitle">Cart</h3>
    <p class="cart-total" id="cartTotal">Total: 0 LEK</p>
    <div class="cart-items" id="cartItems">No items yet.</div>
  </div>
  <textarea id="orderNote" placeholder="Add a note (optional)"></textarea>
  <button class="primary-btn cart-send-btn" id="sendOrderBtn" disabled>Send Order</button>
</section>

    </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="menu-data.js"></script>
    <script src="guest-menu.js"></script>
  </body>
</html>
